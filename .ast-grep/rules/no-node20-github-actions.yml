# GitHub Actions runner の Node.js 20 廃止警告を再発させない。
# Node.js 24 対応 action へ更新し、旧メジャーへの巻き戻しを静的に禁止する。
id: no-node20-github-actions
language: yaml
severity: error
message: Node.js 20 対象の GitHub Action は禁止。Node.js 24 対応版を使用する
files:
  - .github/workflows/**
rule:
  pattern: "uses: $ACTION"
constraints:
  ACTION:
    # pnpm/action-setup は v4.4.0 で node24 化されたため、v4.0〜v4.3 と可変 v4 を禁止する。
    regex: "^(actions/checkout@v[1-4]($|\\.)|actions/setup-dotnet@v[1-4]($|\\.)|actions/setup-node@v[1-4]($|\\.)|actions/upload-artifact@v[1-5]($|\\.)|pnpm/action-setup@v([1-3]($|\\.)|4($|\\.[0-3]($|\\.))))"
