# nightly の重量ゲート。apps/api-fsharp/ci.sh をフル実行する
# (build / fantomas / FSharpLint / 複雑度 / テスト+カバレッジ / アーキテクチャ適合性 /
#  gitleaks / Trivy / SBOM / ZAP / Schemathesis / SARIF 集約 / Renovate dry-run)。
#
# - push 時の軽量ゲートは verify.yml → scripts/verify.sh
# - Pact Broker / Jaeger は runner に無いので ci.sh 側の判定で自動スキップされる
# - 失敗時は ci-nightly ラベル付き Issue に起票 (既存 open Issue があればコメント追記)
name: nightly

on:
  schedule:
    - cron: "0 18 * * *" # 03:00 JST
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  heavy:
    name: ci.sh フル実行
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      # tools/Migrator と src/SalesManagement (ZAP / Schemathesis の標的) が使う DB。
      # 接続情報は Migrator の DATABASE_URL デフォルトと docker-compose.yml に合わせる
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: sales_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d sales_management"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks が git 履歴全体を走査する
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # Renovate dry-run (npx renovate) 用

      - name: dotnet ローカルツールを復元 (fantomas / fsharplint / CycloneDX)
        working-directory: apps/api-fsharp
        run: dotnet tool restore
      - name: scc をインストール (複雑度計測)
        run: |
          go install github.com/boyter/scc/v3@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: gitleaks をインストール (シークレット検出)
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Trivy をインストール (脆弱性スキャン)
        run: |
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: ci.sh 実行
        working-directory: apps/api-fsharp
        run: bash ci.sh

      - name: CI 成果物をアップロード (SARIF / SBOM / カバレッジ / レポート)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: apps/api-fsharp/ci-results/
          retention-days: 14
          if-no-files-found: warn

      - name: 失敗時に Issue へエスカレーション
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create ci-nightly --color d73a4a \
            --description "nightly CI (ci.sh) の失敗" --force || true
          existing=$(gh issue list --label ci-nightly --state open \
            --json number --jq '.[0].number' || true)
          body=$(printf '%s\n\n%s' \
            "nightly CI が失敗しました: ${RUN_URL}" \
            "SARIF / ログは run の ci-results アーティファクトを参照。原因分析は LESSONS.md の運用に従うこと。")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "nightly CI 失敗 ($(date -u +%Y-%m-%d))" \
              --label ci-nightly --body "$body"
          fi
