  /api/external/price-check:
    get:
      operationId: externalPriceCheck
      summary: 外部価格 API 連携（参考価格取得）
      description: |
        WireMock スタブ等の外部価格 API から参考価格を取得。
        リトライ・サーキットブレーカー（Polly）が前段にあり、上流障害時は 502/503 を返す。
        `viewer` ロール以上で利用可能。
      parameters:
        - { name: lotId, in: query, required: true, schema: { type: string }, description: "ロット番号（例: 2024-A-001）" }
      responses:
        '200':
          description: 価格取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceCheckResponse'
        '400':
          description: lotId 未指定など。Problem Details 形式
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '502':
          description: 上流 API がタイムアウト / 異常応答 / パース失敗
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '503':
          description: サーキットブレーカーが OPEN
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
