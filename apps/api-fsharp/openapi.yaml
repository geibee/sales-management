                            periodAdjustmentRate: { type: number, minimum: 0.9, maximum: 1.1, description: "調整率(API値)。表示は百分率で API には1/100した値。0.9〜1.1" }
                            counterpartyAdjustmentRate: { type: number, minimum: 0.9, maximum: 1.1, description: "調整率(API値) 0.9〜1.1" }
                            exceptionalPeriodAdjustmentRate: { type: number, nullable: true, minimum: 0.9, maximum: 1.1, description: "調整率(API値) 0.9〜1.1" }
                version: { type: integer, minimum: 1, maximum: 2147483647, description: 楽観的ロック用バージョン }
