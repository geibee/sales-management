  /sales-cases:
    get:
      operationId: listSalesCases
      summary: 販売案件一覧
      description: |
        販売案件をページング付きで取得する。`status` / `caseType` クエリでフィルタ、
        `limit` (1..200, default 50) と `offset` (>= 0, default 0) でページング。
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, minLength: 1, description: "案件ステータス (例 before_appraisal, appraised, contracted など)" } }
        - { name: caseType, in: query, required: false, schema: { type: string, enum: [direct, reservation, consignment] } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, maximum: 2147483647, default: 0 } }
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesCasesListResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
    post:
      operationId: createSalesCase
      summary: 販売案件作成
      requestBody:
        required: true
        content:
          application/json:
            example: {lots: ['2026-A-001'], divisionCode: 1, salesDate: '2026-04-15', caseType: 'direct'}
            schema:
              type: object
              required: [lots, divisionCode, salesDate, caseType]
              properties:
                lots:
                  type: array
                  items: { type: string, pattern: '^[0-9]{1,9}-[^-\u0000]+-[0-9]{1,9}$' }
                  minItems: 1
                divisionCode: { type: integer, minimum: -2147483648, maximum: 2147483647 }
                salesDate: { type: string, format: date }
                caseType:
                  type: string
                  enum: [direct, reservation, consignment]
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedSalesCaseResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /sales-cases/{id}/lots:
    put:
      operationId: editCaseLots
      summary: 販売案件のロット組み合わせ修正
      description: |
        案件に紐づくロットの集合を total replace する。価格・査定登録前の direct（before_appraisal）
        および consignment（before_consignment）のみ許可（reservation は不可）。各ロットは製造完了かつ
        他案件に未割当である必要がある（自案件に現在割当済みのロットは可）。`version` は楽観的ロック用。
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, pattern: '^[0-9]{1,9}-[0-9]{1,9}-[0-9]{1,9}$' }, description: 販売案件番号 (年-月-連番) }
      requestBody:
        required: true
        content:
          application/json:
            example: {lots: ['2026-A-001'], version: 1}
            schema:
              $ref: '#/components/schemas/EditCaseLotsRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedSalesCaseResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

