openapi: 3.0.3
info:
  title: Sales Management API
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: ローカル開発（直接起動）
  - url: http://localhost:8080
    description: ローカル開発（docker-compose 経由）

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak が発行する JWT。`viewer` または `operator` ロールが必要。
  responses:
    Conflict:
      description: 楽観的ロック競合（リクエストの version が現在値と一致しない）。RFC 9457 Problem Details 形式
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    BadRequest:
      description: 不正リクエスト。RFC 9457 Problem Details 形式
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: リソースなし。RFC 9457 Problem Details 形式
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ProblemDetails:
      type: object
      properties:
        type: { type: string, description: 'エラー種別の安定コード (bad-request / not-found / conflict / forbidden 等。URI 形式ではない)' }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

    LotStatus:
      type: string
      enum: [manufacturing, manufactured, shipping_instructed, shipped, conversion_instructed]

    CodeName:
      type: object
      required: [code]
      properties:
        code: { type: integer }
        name:
          type: string
          nullable: true
          description: マスタ未登録のコードは null

    LotResponse:
      type: object
      required: [status, lotNumber, version, division, department, section, processCategory, inspectionCategory, manufacturingCategory, details]
      properties:
        status: { $ref: '#/components/schemas/LotStatus' }
        lotNumber:
          type: string
          example: "2026-A-001"
        version:
          type: integer
          description: 楽観的ロック用バージョン番号
        manufacturingCompletedDate:
          type: string
          format: date
          nullable: true
        shippingDeadlineDate:
          type: string
          format: date
          nullable: true
        shippedDate:
          type: string
          format: date
          nullable: true
        destinationItem:
          type: string
          nullable: true
          description: conversion_instructed 状態のときの品目変換先
        division: { $ref: '#/components/schemas/CodeName' }
        department: { $ref: '#/components/schemas/CodeName' }
        section: { $ref: '#/components/schemas/CodeName' }
        processCategory: { $ref: '#/components/schemas/CodeName' }
        inspectionCategory: { $ref: '#/components/schemas/CodeName' }
        manufacturingCategory: { $ref: '#/components/schemas/CodeName' }
        details:
          type: array
          description: ロット明細（数量・個数など）
          items:
            $ref: '#/components/schemas/LotDetailResponse'

    LotDetailResponse:
      type: object
      required:
        - itemCategory
        - productCategoryCode
        - lengthSpecLower
        - thicknessSpecLower
        - thicknessSpecUpper
        - qualityGrade
        - count
        - quantity
      properties:
        itemCategory:
          type: string
          enum: [general, premium, custom]
        premiumCategory:
          type: string
          nullable: true
        productCategoryCode:
          type: string
        lengthSpecLower:
          type: number
        thicknessSpecLower:
          type: number
        thicknessSpecUpper:
          type: number
        qualityGrade:
          type: string
        count:
          type: integer
          description: 個数
        quantity:
          type: number
          description: 数量
        inspectionResultCategory:
          type: string
          nullable: true

    CreateLotResponse:
      type: object
      required: [status, lotNumber, version]
      properties:
        status: { $ref: '#/components/schemas/LotStatus' }
        lotNumber:
          type: string
          example: "2026-A-001"
        version:
          type: integer

    LotSummary:
      type: object
      required: [status, lotNumber, version]
      properties:
        status: { $ref: '#/components/schemas/LotStatus' }
        lotNumber: { type: string }
        version: { type: integer }
        manufacturingCompletedDate:
          type: string
          format: date
          nullable: true

    LotsListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/LotSummary' }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    AvailableLotsResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/LotSummary' }
        total: { type: integer }

    CodeMasterItem:
      type: object
      required: [code, name]
      properties:
        code: { type: integer }
        name: { type: string }

    DepartmentItem:
      type: object
      required: [code, name, divisionCode]
      properties:
        code: { type: integer }
        name: { type: string }
        divisionCode: { type: integer, description: 所属事業部コード }

    SectionItem:
      type: object
      required: [code, name, departmentCode]
      properties:
        code: { type: integer }
        name: { type: string }
        departmentCode: { type: integer, description: 所属部コード }

    CodeMastersResponse:
      type: object
      required: [divisions, departments, sections, processCategories, inspectionCategories, manufacturingCategories]
      properties:
        divisions:
          type: array
          items: { $ref: '#/components/schemas/CodeMasterItem' }
        departments:
          type: array
          items: { $ref: '#/components/schemas/DepartmentItem' }
        sections:
          type: array
          items: { $ref: '#/components/schemas/SectionItem' }
        processCategories:
          type: array
          items: { $ref: '#/components/schemas/CodeMasterItem' }
        inspectionCategories:
          type: array
          items: { $ref: '#/components/schemas/CodeMasterItem' }
        manufacturingCategories:
          type: array
          items: { $ref: '#/components/schemas/CodeMasterItem' }

    EditCaseLotsRequest:
      type: object
      required: [lots, version]
      properties:
        lots:
          type: array
          items: { type: string, pattern: '^[0-9]{1,9}-[^-\u0000]+-[0-9]{1,9}$' }
          minItems: 1
          description: 新しいロット番号の集合（1件以上）
        version:
          type: integer
          minimum: 1
          maximum: 2147483647
          description: 楽観的ロック用バージョン番号

    SalesCaseType:
      type: string
      enum: [direct, reservation, consignment]

    SalesCaseResponse:
      type: object
      required: [salesCaseNumber, caseType, status]
      properties:
        salesCaseNumber:
          type: string
          example: "2026-01-001"
        caseType: { $ref: '#/components/schemas/SalesCaseType' }
        status: { type: string }
        lots:
          type: array
          items: { type: string }
        divisionCode: { type: integer }
        salesDate:
          type: string
          format: date
        version:
          type: integer
          description: 楽観的ロック用バージョン番号
          nullable: true

    CreatedSalesCaseResponse:
      type: object
      required: [salesCaseNumber, status, version]
      properties:
        salesCaseNumber:
          type: string
          example: "2026-01-001"
        status: { type: string }
        version: { type: integer, description: 楽観的ロック用バージョン番号 }

    SalesCaseSummary:
      type: object
      required: [salesCaseNumber, caseType, status]
      properties:
        salesCaseNumber: { type: string }
        caseType: { $ref: '#/components/schemas/SalesCaseType' }
        status: { type: string }
        salesDate:
          type: string
          format: date
          nullable: true
        divisionCode:
          type: integer
          nullable: true

    SalesCasesListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SalesCaseSummary' }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    ReservationCaseResponse:
      type: object
      required: [salesCaseNumber, status]
      properties:
        salesCaseNumber: { type: string }
        status: { type: string }
        appraisalDate:
          type: string
          format: date
          nullable: true
        reservedLotInfo:
          type: string
          nullable: true
        reservedAmount:
          type: integer
          nullable: true
        determinedDate:
          type: string
          format: date
          nullable: true
        determinedAmount:
          type: integer
          nullable: true
        deliveryDate:
          type: string
          format: date
          nullable: true

    ReservationStatusResponse:
      type: object
      required: [status, version]
      properties:
        status: { type: string }
        version: { type: integer, description: 楽観的ロック用バージョン番号 }

    ConsignmentCaseResponse:
      type: object
      required: [salesCaseNumber, status]
      properties:
        salesCaseNumber: { type: string }
        status: { type: string }
        consignorName:
          type: string
          nullable: true
        consignorCode:
          type: string
          nullable: true
        designatedDate:
          type: string
          format: date
          nullable: true
        resultDate:
          type: string
          format: date
          nullable: true
        resultAmount:
          type: integer
          nullable: true

    ConsignmentStatusResponse:
      type: object
      required: [status, version]
      properties:
        status: { type: string }
        version: { type: integer, description: 楽観的ロック用バージョン番号 }

    DirectAppraisal:
      type: object
      description: direct 案件の価格査定情報
      required: [type, appraisalDate, deliveryDate, salesMarket, taxExcludedEstimatedTotal]
      properties:
        type: { type: string, description: 査定種別 (normal / customer_contract) }
        appraisalDate: { type: string, format: date }
        deliveryDate: { type: string, format: date }
        salesMarket: { type: string }
        taxExcludedEstimatedTotal: { type: integer }

    DirectContract:
      type: object
      description: direct 案件の売買契約情報
      required: [contractDate, person, customerNumber, taxExcludedContractAmount, consumptionTax]
      properties:
        contractDate: { type: string, format: date }
        person: { type: string }
        customerNumber: { type: string }
        taxExcludedContractAmount: { type: integer }
        consumptionTax: { type: integer }

    ShippingInstruction:
      type: object
      description: direct 案件の出荷指示情報
      required: [instructionDate]
      properties:
        instructionDate: { type: string, format: date }

    ShippingCompletion:
      type: object
      description: direct 案件の出荷完了情報
      required: [completionDate]
      properties:
        completionDate: { type: string, format: date }

    ReservationPrice:
      type: object
      description: reservation 案件の予約価格
      required: [appraisalDate, reservedLotInfo, reservedAmount]
      properties:
        appraisalDate: { type: string, format: date }
        reservedLotInfo: { type: string }
        reservedAmount: { type: integer }

    ReservationDetermination:
      type: object
      description: reservation 案件の確定情報
      required: [determinedDate, determinedAmount]
      properties:
        determinedDate: { type: string, format: date }
        determinedAmount: { type: integer }

    ReservationDelivery:
      type: object
      description: reservation 案件の引き渡し情報
      required: [deliveredDate]
      properties:
        deliveredDate: { type: string, format: date }

    Consignor:
      type: object
      description: consignment 案件の委託元情報
      required: [consignorName, consignorCode, designatedDate]
      properties:
        consignorName: { type: string }
        consignorCode: { type: string }
        designatedDate: { type: string, format: date }

    ConsignmentResult:
      type: object
      description: consignment 案件の結果情報
      required: [resultDate, resultAmount]
      properties:
        resultDate: { type: string, format: date }
        resultAmount: { type: integer }

    DirectSalesCaseDetail:
      type: object
      description: direct 案件の詳細レスポンス
      required: [salesCaseNumber, caseType, status, lots, divisionCode, salesDate, version, appraisal, contract, shippingInstruction, shippingCompletion]
      properties:
        salesCaseNumber:
          type: string
          example: "2026-01-001"
        caseType:
          type: string
          enum: [direct]
        status:
          type: string
          description: 案件ステータス (before_appraisal, appraised, contracted など)
        lots:
          type: array
          items: { type: string }
          description: 関連するロット番号
        divisionCode: { type: integer }
        salesDate: { type: string, format: date }
        version: { type: integer, description: 楽観的ロック用バージョン番号 }
        appraisal:
          allOf: [{ $ref: '#/components/schemas/DirectAppraisal' }]
          nullable: true
        contract:
          allOf: [{ $ref: '#/components/schemas/DirectContract' }]
          nullable: true
        shippingInstruction:
          allOf: [{ $ref: '#/components/schemas/ShippingInstruction' }]
          nullable: true
        shippingCompletion:
          allOf: [{ $ref: '#/components/schemas/ShippingCompletion' }]
          nullable: true

    ReservationSalesCaseDetail:
      type: object
      description: reservation 案件の詳細レスポンス
      required: [salesCaseNumber, caseType, status, lots, divisionCode, salesDate, version, reservationPrice, determination, delivery]
      properties:
        salesCaseNumber:
          type: string
          example: "2026-01-001"
        caseType:
          type: string
          enum: [reservation]
        status:
          type: string
          description: 案件ステータス (reserved, reservation_confirmed, reservation_delivered など)
        lots:
          type: array
          items: { type: string }
          description: 関連するロット番号
        divisionCode: { type: integer }
        salesDate: { type: string, format: date }
        version: { type: integer, description: 楽観的ロック用バージョン番号 }
        reservationPrice:
          allOf: [{ $ref: '#/components/schemas/ReservationPrice' }]
          nullable: true
        determination:
          allOf: [{ $ref: '#/components/schemas/ReservationDetermination' }]
          nullable: true
        delivery:
          allOf: [{ $ref: '#/components/schemas/ReservationDelivery' }]
          nullable: true

    ConsignmentSalesCaseDetail:
      type: object
      description: consignment 案件の詳細レスポンス
      required: [salesCaseNumber, caseType, status, lots, divisionCode, salesDate, version, consignor, result]
      properties:
        salesCaseNumber:
          type: string
          example: "2026-01-001"
        caseType:
          type: string
          enum: [consignment]
        status:
          type: string
          description: 案件ステータス (before_consignment, consignment_designated など)
        lots:
          type: array
          items: { type: string }
          description: 関連するロット番号
        divisionCode: { type: integer }
        salesDate: { type: string, format: date }
        version: { type: integer, description: 楽観的ロック用バージョン番号 }
        consignor:
          allOf: [{ $ref: '#/components/schemas/Consignor' }]
          nullable: true
        result:
          allOf: [{ $ref: '#/components/schemas/ConsignmentResult' }]
          nullable: true

    SalesCaseDetailResponse:
      description: |
        販売案件詳細レスポンス。`caseType` で direct / reservation / consignment を判別する
        ポリモーフィックスキーマ (oneOf + discriminator)。
      oneOf:
        - $ref: '#/components/schemas/DirectSalesCaseDetail'
        - $ref: '#/components/schemas/ReservationSalesCaseDetail'
        - $ref: '#/components/schemas/ConsignmentSalesCaseDetail'
      discriminator:
        propertyName: caseType
        mapping:
          direct: '#/components/schemas/DirectSalesCaseDetail'
          reservation: '#/components/schemas/ReservationSalesCaseDetail'
          consignment: '#/components/schemas/ConsignmentSalesCaseDetail'

    PriceCheckResponse:
      type: object
      required: [basePrice, source]
      properties:
        basePrice:
          type: number
          format: double
          description: 基準単価
        adjustmentRate:
          type: number
          format: double
          nullable: true
          description: 期間調整率
        source:
          type: string
          description: 価格情報の出所（外部 API 識別子）

    AuthConfigResponse:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: 認証が有効かどうか
        authority:
          type: string
          nullable: true
          description: IdP authority URL (Authentication.Enabled=true の時のみ)
        audience:
          type: string
          nullable: true
          description: JWT audience (Authentication.Enabled=true の時のみ)

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: healthCheck
      summary: ヘルスチェック
      security: []
      responses:
        '200':
          description: OK

  /auth/config:
    get:
      operationId: getAuthConfig
      summary: 認証設定の取得 (公開エンドポイント)
      description: |
        フロントエンドが起動時に叩いて認証 ON/OFF と IdP authority を判定する公開エンドポイント。
        認証 OFF の場合は `{ enabled: false }` のみ返す。
        認証 ON の場合は `{ enabled, authority, audience }` を返す。
      security: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfigResponse'

  /lots:
    get:
      operationId: listLots
      summary: 在庫ロット一覧
      description: |
        在庫ロットをページング付きで取得する。`status` クエリで状態フィルタ、
        `limit` (1..200, default 50) と `offset` (>= 0, default 0) でページング。
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, enum: [manufacturing, manufactured, shipping_instructed, shipped, conversion_instructed] } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0, maximum: 2147483647, default: 0 } }
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LotsListResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
    post:
      operationId: createLot
      summary: 在庫ロット作成
      requestBody:
        required: true
        content:
          application/json:
            example: {lotNumber: {year: 2026, location: 'F12A', seq: 1}, divisionCode: 1, departmentCode: 10, sectionCode: 100, processCategory: 1, inspectionCategory: 1, manufacturingCategory: 1, details: [{itemCategory: 'premium', premiumCategory: 'A', productCategoryCode: 'v1', lengthSpecLower: 1.0, thicknessSpecLower: 1.0, thicknessSpecUpper: 2.0, qualityGrade: 'A', count: 1, quantity: 10.0, inspectionResultCategory: 'pass'}]}
            schema:
              type: object
              required: [lotNumber, divisionCode, departmentCode, sectionCode, processCategory, inspectionCategory, manufacturingCategory, details]
              properties:
                lotNumber:
                  type: object
                  required: [year, location, seq]
                  properties:
                    year: { type: integer, minimum: 1, maximum: 2147483647 }
                    location: { type: string, minLength: 1, pattern: '^[^-\s\u0000]+$' }
                    seq: { type: integer, minimum: 1, maximum: 2147483647 }
                divisionCode: { type: integer, minimum: -2147483648, maximum: 2147483647 }
                departmentCode: { type: integer, minimum: -2147483648, maximum: 2147483647 }
                sectionCode: { type: integer, minimum: -2147483648, maximum: 2147483647 }
                processCategory: { type: integer, minimum: -2147483648, maximum: 2147483647 }
                inspectionCategory: { type: integer, minimum: -2147483648, maximum: 2147483647 }
                manufacturingCategory: { type: integer, minimum: -2147483648, maximum: 2147483647 }
                details:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [itemCategory, productCategoryCode, lengthSpecLower, thicknessSpecLower, thicknessSpecUpper, qualityGrade, count, quantity]
                    properties:
                      itemCategory: { type: string, enum: [general, premium, custom] }
                      premiumCategory: { type: string, pattern: '^[^\u0000]*$' }
                      productCategoryCode: { type: string, pattern: '^[^\u0000]*$' }
                      lengthSpecLower: { type: number, minimum: -9999999999, maximum: 9999999999 }
                      thicknessSpecLower: { type: number, minimum: -9999999999, maximum: 9999999999 }
                      thicknessSpecUpper: { type: number, minimum: -9999999999, maximum: 9999999999 }
                      qualityGrade: { type: string, pattern: '^[^\u0000]*$' }
                      count: { type: integer, minimum: 1, maximum: 2147483647 }
                      quantity: { type: number, minimum: 0.001, maximum: 9999999999 }
                      inspectionResultCategory: { type: string, pattern: '^[^\u0000]*$' }
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLotResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /lots/export:
    get:
      operationId: exportLotsCsv
      summary: 在庫ロット CSV エクスポート
      description: |
        在庫ロットを CSV ファイルとしてダウンロード（Windows-31J / CP932 エンコーディング）。
        `viewer` ロール以上で利用可能。実装は `LotCsvExport.fs`。
      parameters:
        - { name: format, in: query, required: false, schema: { type: string, enum: [csv], default: csv }, description: 現状は csv のみ }
        - { name: status, in: query, required: false, schema: { type: string, enum: [manufacturing, manufactured, shipping_instructed, shipped, conversion_instructed] }, description: ロット状態フィルタ }
      responses:
        '200':
          description: CSV ファイル本体
          headers:
            Content-Disposition:
              schema: { type: string }
              description: 'attachment; filename="lots_yyyyMMdd.csv"'
          content:
            text/csv:
              schema:
                type: string
                format: binary
                description: |
                  CSV 本体 (Windows-31J / CP932 エンコーディング)。1行目はヘッダ（ロット番号,事業部,状態,製造完了日）。
                  実 HTTP レスポンスの Content-Type ヘッダは `text/csv; charset=windows-31j` を返すが、
                  OpenAPI 3.x の content-type キーには parameter を含めない (RFC 6838 / OpenAPI Spec) ため
                  ここでは type/subtype のみ宣言。
        '400': { $ref: '#/components/responses/BadRequest' }

  /lots/available:
    get:
      operationId: listAvailableLots
      summary: 販売案件に割当可能なロット一覧
      description: |
        製造完了かつどの販売案件にも割り当てられていないロットを返す。
        `excludeCase` を指定すると、その案件に現在割り当て済みのロットも「割当可能」として含める（案件のロット修正用）。
      parameters:
        - { name: excludeCase, in: query, required: false, schema: { type: string, pattern: '^[0-9]{1,9}-[0-9]{1,9}-[0-9]{1,9}$' }, description: 除外する販売案件番号（年-月-連番） }
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableLotsResponse'
        '400': { $ref: '#/components/responses/BadRequest' }

  /code-masters:
    get:
      operationId: getCodeMasters
      summary: コード値マスタ取得
      description: |
        事業部/部/課（階層）・工程区分/検査区分/製造区分（フラット）のコード値と名称の一覧。
        ロット作成フォームのドロップダウンに用いる。`viewer` ロール以上で利用可能。
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeMastersResponse'

  /lots/{id}:
    get:
      operationId: getLot
      summary: 在庫ロット取得
